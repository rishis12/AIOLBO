version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SEC_CONTACT_EMAIL=${SEC_CONTACT_EMAIL}
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY}
    volumes:
      - ./.sec_cache:/app/.sec_cache
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
